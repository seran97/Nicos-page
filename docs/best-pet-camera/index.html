<style>
:root {
  --bg: #0a0a0f;

  --borde: rgba(255,255,255,0.07);

  --rojo: #ff4757;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  width: 100%;
  margin: 0;
  padding: 0;
  overflow-x: hidden;
  background: var(--bg);
  color: var(--blanco);
  font-family: 'Inter', sans-serif;

}

/* ── STICKY NAV ── */
.sticky-nav {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  z-index: 1000;
  background: rgba(10,10,15,0.82);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--borde);
  padding: 0 24px;
}

.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  max-width: 1100px;
  margin: 0 auto;
  height: 56px;
}

.nav-logo {
  font-weight: 900;
  font-size: 1rem;
  color: var(--accent);
  letter-spacing: 0.04em;
  text-decoration: none;
  white-space: nowrap;
}

.nav-logo span {
  color: var(--blanco);
}

.nav-links {
  display: flex;
  gap: 6px;
  list-style: none;
  flex-wrap: wrap;
}

.nav-links a {
  color: var(--gris);
  text-decoration: none;
  font-size: 0.82rem;
  font-weight: 600;
  padding: 6px 12px;
  border-radius: 8px;
  transition: color 0.2s, background 0.2s;
  position: relative;
  white-space: nowrap;
}

.nav-links a:hover,
.nav-links a.active {
  color: var(--blanco);
  background: rgba(230,126,34,0.12);
}

.nav-links a.active::after {
  content: '';
  position: absolute;
  bottom: 2px;
  left: 12px;
  right: 12px;
  height: 2px;
  background: var(--accent);
  border-radius: 2px;
}

/* ── TICKER ── */
.ticker-wrap {
  width: 100%;
  background: var(--bg2);
  border-bottom: 1px solid var(--borde);
  overflow: hidden;
  padding: 10px 0;
  margin-top: 56px;
}

.ticker-track {
  display: flex;
  gap: 0;
  white-space: nowrap;
  animation: ticker-scroll 28s linear infinite;
}

.ticker-track:hover {
  animation-play-state: paused;
}

@keyframes ticker-scroll {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

.ticker-item {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 0 32px;
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--gris);
  text-transform: uppercase;
}

.ticker-item .val-up   { color: var(--verde); }
.ticker-item .val-down { color: var(--rojo); }

  flex-direction: column;
  justify-content: center;

  text-align: center;

  position: relative;
  background: linear-gradient(135deg, #0a0a0f 0%, #0f0f1a 40%, #12101a 70%, #0a0a0f 100%);
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: clamp(400px, 80vw, 900px);
  height: clamp(400px, 80vw, 900px);
  background: radial-gradient(ellipse at center, rgba(230,126,34,0.18) 0%, rgba(211,84,0,0.08) 35%, transparent 70%);

  pointer-events: none;
  z-index: 0;
}

.hero::after {
  content: '';
  position: absolute;
  top: 20%;
  right: 10%;
  width: 300px;
  height: 300px;
  background: radial-gradient(ellipse at center, rgba(0,212,170,0.07) 0%, transparent 70%);

  pointer-events: none;
  z-index: 0;
}

  0%   { opacity: 0.6; transform: translate(-50%, -50%) scale(0.95); }
  100% { opacity: 1;   transform: translate(-50%, -50%) scale(1.05); }
}

.hero-content {

  width: 100%;

  margin-bottom: 28px;
}

  height: 6px;
  border-radius: 50%;

}

  0%, 100% { opacity: 1; }

}

.hero h1 {
  font-size: clamp(2rem, 7vw, 3.5rem);

}

}

}

  display: inline-flex;

  color: #fff;
  font-weight: 700;
  font-size: clamp(0.95rem, 2vw, 1.05rem);

  transition: transform 0.2s, box-shadow 0.2s;
  animation: pulse-glow 2.5s ease-in-out infinite;
  white-space: nowrap;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(211,84,0,0.5);
}

  0%, 100% { box-shadow: 0 0 20px rgba(211,84,0,0.35), 0 4px 16px rgba(0,0,0,0.4); }
  50%       { box-shadow: 0 0 40px rgba(211,84,0,0.6), 0 4px 24px rgba(0,0,0,0.5); }
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;

  font-size: 0.95rem;
  padding: 16px 28px;

  white-space: nowrap;
}

  background: rgba(230,126,34,0.07);

<style>
:root {
  --bg: #0a0a0f;
  --bg2: #111118;
  --card: #16161f;

  --gris: #8888a0;
  --borde: rgba(255,255,255,0.07);
  --verde: #00d4aa;

}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  width: 100%;
  margin: 0;
  padding: 0;
  overflow-x: hidden;
  background: var(--bg);
  color: var(--blanco);
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  line-height: 1.6;
  scroll-behavior: smooth;
}

/* ── STICKY NAV ── */
.nav {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  z-index: 1000;
  background: rgba(10,10,15,0.82);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--borde);
  padding: 0 20px;
}

.nav-inner {
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 58px;
  gap: 12px;
}

.nav-logo {
  font-weight: 900;
  font-size: 1.05rem;
  color: var(--blanco);
  letter-spacing: -0.5px;
  white-space: nowrap;
  flex-shrink: 0;
}

.nav-logo span {
  color: var(--accent);
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 4px;
  list-style: none;
  flex-wrap: wrap;
}

.nav-links a {
  color: var(--gris);
  text-decoration: none;
  font-size: 0.82rem;
  font-weight: 600;
  padding: 6px 10px;
  border-radius: 6px;
  transition: color 0.2s, background 0.2s;
  position: relative;
  white-space: nowrap;
}

.nav-links a::after {
  content: '';
  position: absolute;
  bottom: 2px;
  left: 10px;
  right: 10px;
  height: 2px;
  background: var(--accent);
  border-radius: 2px;
  transform: scaleX(0);
  transition: transform 0.2s;
}

.nav-links a:hover,
.nav-links a.active {
  color: var(--blanco);
  background: rgba(52,152,219,0.1);
}

.nav-links a.active::after {
  transform: scaleX(1);
}

/* ── TICKER ── */
.ticker-wrap {
  width: 100%;
  background: var(--bg2);
  border-bottom: 1px solid var(--borde);
  overflow: hidden;
  padding: 9px 0;
  margin-top: 58px;
}

.ticker-track {
  display: flex;
  width: max-content;
  animation: ticker-scroll 28s linear infinite;
}

.ticker-track:hover {
  animation-play-state: paused;
}

.ticker-item {
  white-space: nowrap;
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  padding: 0 32px;
  color: var(--gris);
}

.ticker-item .t-pos { color: var(--verde); }
.ticker-item .t-neg { color: var(--rojo); }
.ticker-item .t-acc { color: var(--accent); }
.ticker-sep { color: var(--borde); margin: 0 4px; }

@keyframes ticker-scroll {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* ── HERO ── */
.hero {
  width: 100vw;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 100px 24px 60px;
  position: relative;
  background: linear-gradient(135deg, #0a0a0f 0%, #0d0d18 40%, #0a0f1a 70%, #0a0a0f 100%);
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -55%);
  width: clamp(400px, 80vw, 900px);
  height: clamp(400px, 80vw, 900px);
  background: radial-gradient(ellipse at center, rgba(52,152,219,0.18) 0%, rgba(41,128,185,0.08) 40%, transparent 70%);
  border-radius: 50%;
  animation: glow-pulse 5s ease-in-out infinite alternate;
  pointer-events: none;
  z-index: 0;
}

.hero::after {
  content: '';
  position: absolute;
  bottom: -80px;
  right: -80px;
  width: 400px;
  height: 400px;
  background: radial-gradient(ellipse at center, rgba(0,212,170,0.07) 0%, transparent 65%);
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
}

@keyframes glow-pulse {
  0%   { opacity: 0.7; transform: translate(-50%, -55%) scale(1); }
  100% { opacity: 1;   transform: translate(-50%, -55%) scale(1.08); }
}

.hero-inner {
  position: relative;
  z-index: 1;
  max-width: 820px;
  width: 100%;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  border: 1px solid rgba(52,152,219,0.4);
  background: rgba(52,152,219,0.08);
  color: var(--accent);
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 5px 14px;
  border-radius: 50px;
  margin-bottom: 22px;
}

.hero-badge .dot {
  width: 7px;
  height: 7px;
  background: var(--verde);
  border-radius: 50%;
  animation: blink 1.4s ease-in-out infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.2; }
}

.hero h1 {
  font-size: clamp(2rem, 7vw, 3.5rem);
  font-weight: 900;
  line-height: 1.1;
  letter-spacing: -1.5px;
  background: linear-gradient(135deg, #f0f0f5 0%, #c8d8f0 40%, #3498db 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 18px;
}

.hero-sub {
  font-size: clamp(0.95rem, 2.5vw, 1.15rem);
  color: var(--gris);
  font-weight: 400;
  max-width: 580px;
  margin: 0 auto 28px;
  line-height: 1.65;
}

.hero-trust {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--gris);
  letter-spacing: 0.04em;
}

.hero-trust .sep { color: var(--borde); }
.hero-trust .hl  { color: var(--verde); }

.hero-stats-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
  flex-wrap: wrap;
  margin-top: 36px;
}

.hero-stat-pill {
  background: var(--card);
  border: 1px solid var(--borde);
  border-radius: 12px;
  padding: 12px 22px;
  text-align: center;
}

.hero-stat-pill .val {
  font-size: clamp(1.3rem, 3vw, 1.7rem);
  font-weight: 900;
  color: var(--accent);
  display: block;
  line-height: 1;
}

.hero-stat-pill .lbl {
  font-size: 0.68rem;
  color: var(--gris);
  font-weight: 600;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  margin-top: 4px;
  display: block;
}

/* ── SECTIONS ── */
.section {
  max-width: 860px;
  margin: 0 auto;
  padding: 70px 20px;
}

.section-full {
  width: 100%;
  padding: 70px 0;
  background: var(--bg2);
  border-top: 1px solid var(--borde);
  border-bottom: 1px solid var(--borde);
}

.section-full .section-inner {
  max-width: 860px;
  margin: 0 auto;
  padding: 0 20px;
}

.section-label {
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-label::before {
  content: '';
  display: inline-block;
  width: 18px;
  height: 2px;
  background: var(--accent);
  border-radius: 2px;
}

.section-title {
  font-size: clamp(1.4rem, 4vw, 2rem);
  font-weight: 900;
  color: var(--blanco);
  letter-spacing: -0.5px;
  margin-bottom: 8px;
  line-height: 1.2;
}

.section-sub {
  font-size: 0.92rem;
  color: var(--gris);
  margin-bottom: 36px;
}

/* ── TREND DASHBOARD ── */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  margin-bottom: 36px;
}

.stat-card {
  background: var(--card);
  border: 1px solid var(--borde);
  border-radius: 14px;
  padding: 22px 20px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.3s, transform 0.2s;
}

.stat-card:hover {
  border-color: rgba(52,152,219,0.35);
  transform: translateY(-2px);
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), transparent);
}

.stat-card .s-val {
  font-size: clamp(2rem, 6vw, 3rem);
  font-weight: 900;
  color: var(--accent);
  line-height: 1;
  display: block;
}

.stat-card .s-val.verde { color: var(--verde); }
.stat-card .s-val.rojo  { color: var(--rojo); }

.stat-card .s-lbl {
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--gris);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-top: 6px;
  display: block;
}

.stat-card .s-badge {
  position: absolute;
  top: 14px;
  right: 14px;
  font-size: 0.65rem;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 50px;
  background: rgba(0,212,170,0.12);
  color: var(--verde);
  border: 1px solid rgba(0,212,170,0.25);
}

.progress-section {
  display: flex;
  flex-direction: column;

}

.progress-item {}

<style>
:root {
  --bg: #0a0a0f;
  --bg2: #111118;
  --card: #16161f;
  --card2: #1e1e2a;
  --accent: #27ae60;
  --accent2: #2ecc71;
  --cta: #27ae60;
  --blanco: #f0f0f5;
  --gris: #8888a0;
  --borde: rgba(255,255,255,0.07);
  --verde: #00d4aa;
  --rojo: #ff4757;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  width: 100%;
  margin: 0;
  padding: 0;
  overflow-x: hidden;
  background: var(--bg);
  color: var(--blanco);
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ─── STICKY NAV ─── */
.sticky-nav {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  z-index: 1000;
  background: rgba(10,10,15,0.82);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--borde);
  padding: 0 24px;
}

.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  max-width: 1100px;
  margin: 0 auto;
  height: 56px;
}

.nav-logo {
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--accent2);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  text-decoration: none;
  white-space: nowrap;
}

.nav-links {
  display: flex;
  gap: 6px;
  list-style: none;
  overflow-x: auto;
  scrollbar-width: none;
}

.nav-links::-webkit-scrollbar { display: none; }

.nav-links a {
  display: block;
  padding: 6px 12px;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--gris);
  text-decoration: none;
  border-radius: 6px;
  border-bottom: 2px solid transparent;
  transition: color 0.2s, border-color 0.2s;
  white-space: nowrap;
}

.nav-links a:hover,
.nav-links a.active {
  color: var(--blanco);
  border-bottom-color: var(--accent);
}

/* ─── TICKER ─── */
.ticker-wrap {
  width: 100%;
  background: var(--bg2);
  border-bottom: 1px solid var(--borde);
  overflow: hidden;
  padding: 10px 0;
  margin-top: 56px;
}

.ticker-track {
  display: flex;
  gap: 0;
  animation: ticker-scroll 38s linear infinite;
  width: max-content;
}

.ticker-track:hover { animation-play-state: paused; }

@keyframes ticker-scroll {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

.ticker-item {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 0 32px;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--gris);
  white-space: nowrap;
}

.ticker-item .t-pos { color: var(--verde); }
.ticker-item .t-neg { color: var(--rojo); }
.ticker-item .t-sep { color: var(--borde); font-size: 1rem; }

/* ─── HERO ─── */
.hero {
  position: relative;
  width: 100vw;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 100px 24px 60px;
  background: linear-gradient(135deg, #0a0a0f 0%, #0d0d18 40%, #0a1a12 100%);
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: clamp(400px, 80vw, 900px);
  height: clamp(400px, 80vw, 900px);
  background: radial-gradient(ellipse at center, rgba(39,174,96,0.18) 0%, rgba(39,174,96,0.06) 40%, transparent 70%);
  animation: glow-pulse 5s ease-in-out infinite;
  pointer-events: none;
  z-index: 0;
}

.hero::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 0;
  width: 100%;
  height: 120px;
  background: linear-gradient(to bottom, transparent, var(--bg));
  z-index: 1;
  pointer-events: none;
}

@keyframes glow-pulse {
  0%, 100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1); }
  50%       { opacity: 1;   transform: translate(-50%, -50%) scale(1.08); }
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 820px;
  width: 100%;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 16px;
  border: 1px solid rgba(39,174,96,0.4);
  border-radius: 999px;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent2);
  background: rgba(39,174,96,0.08);
  margin-bottom: 24px;
}

.hero-badge .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent2);
  animation: blink 1.4s ease-in-out infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.2; }
}

.hero h1 {
  font-size: clamp(2rem, 7vw, 3.5rem);
  font-weight: 900;
  line-height: 1.1;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, #f0f0f5 0%, #c8ffd4 50%, #27ae60 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 20px;
}

.hero-sub {
  font-size: clamp(0.95rem, 2.5vw, 1.15rem);
  color: var(--gris);
  font-weight: 400;
  max-width: 600px;
  margin: 0 auto 28px;
  line-height: 1.7;
}

.hero-trust {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  gap: 8px 20px;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--gris);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.hero-trust .sep { color: var(--borde); }
.hero-trust .hi  { color: var(--accent2); }

.hero-cta-wrap {
  margin-top: 36px;
  display: flex;
  justify-content: center;
}

.btn-cta {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  background: var(--cta);
  color: #fff;
  font-size: clamp(0.95rem, 2.5vw, 1.1rem);
  font-weight: 700;
  padding: 16px 40px;
  border-radius: 14px;
  text-decoration: none;
  border: none;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  animation: pulse-glow 2.8s ease-in-out infinite;
  letter-spacing: 0.02em;
}

.btn-cta:hover {
  transform: translateY(-2px);
  animation: none;
  box-shadow: 0 0 32px rgba(39,174,96,0.7), 0 8px 24px rgba(0,0,0,0.4);
}

@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 0 16px rgba(39,174,96,0.4), 0 4px 16px rgba(0,0,0,0.3); }
  50%       { box-shadow: 0 0 36px rgba(39,174,96,0.75), 0 8px 28px rgba(0,0,0,0.4); }
}

/* ─── SECTIONS WRAPPER ─── */
.section-wrap {
  max-width: 860px;
  margin: 0 auto;
  padding: 0 20px;
}

section {
  padding: 72px 0;
}

.section-label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent2);
  margin-bottom: 12px;
}

.section-label::before {
  content: '';
  display: block;
  width: 18px;
  height: 2px;
  background: var(--accent2);
  border-radius: 2px;
}

.section-title {
  font-size: clamp(1.4rem, 4vw, 2rem);
  font-weight: 800;
  color: var(--blanco);
  margin-bottom: 8px;
  line-height: 1.2;
}

.section-sub {
  font-size: 0.95rem;
  color: var(--gris);
  margin-bottom: 40px;
  line-height: 1.6;
}

/* ─── TREND DASHBOARD ─── */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  margin-bottom: 36px;
}

@media (min-width: 600px) {
  .stat-grid { grid-template-columns: repeat(4, 1fr); }
}

.stat-card {
  background: var(--card);
  border: 1px solid var(--borde);
  border-radius: 14px;
  padding: 22px 18px;
  text-align: center;
  transition: border-color 0.3s, transform 0.2s;
}

.stat-card:hover {
  border-color: rgba(39,174,96,0.35);
  transform: translateY(-2px);
}

.stat-number {
  font-size: clamp(2rem, 6vw, 3rem);
  font-weight: 900;
  line-height: 1;
  margin-bottom: 6px;
}

.stat-number.accent  { color: var(--accent); }
.stat-number.verde   { color: var(--verde); }
.stat-number.accent2 { color: var(--accent2); }

.stat-label {
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--gris);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.stat-sub {
  font-size: 0.68rem;
  color: var(--accent2);
  margin-top: 4px;
  font-weight: 600;
}

/* Progress bars */
.progress-section {
  background: var(--card);
  border: 1px solid var(--borde);
  border-radius: 16px;
  padding: 28px 28px;
}

.progress-title {
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--blanco);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 24px;
}

.progress-item {
  margin-bottom: 22px;
}

.progress-item:last-child { margin-bottom: 0; }

.progress-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.progress-name {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--blanco);
}

.progress-val {
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--accent2);
}

.progress-bar-bg {
  width: 100%;
  height: 8px;
  background: rgba(255,255,255,0.06);
  border-radius: 999px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  border-radius: 999px;
  width: 0;
  transition: width 1.5s ease;
}

.fill-accent  { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
.fill-verde   { background: linear-gradient(90deg, var(--verde), #00ffcc); }

/* ─── PRODUCT SECTION ─── */
.product-card {
  background: var(--card);
  border: 1px solid var(--borde);
  border-left: 4px solid var(--accent);
  border-radius: 16px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 0;
  transition: box-shadow 0.3s;
}

.product-card:hover {
  box-shadow: 0 0 40px rgba(39,174,96,0.12), 0 8px 32px rgba(0,0,0,0.4);

.product-img-wrap {

.product-img {

.product-name {

.btn-cta-product {

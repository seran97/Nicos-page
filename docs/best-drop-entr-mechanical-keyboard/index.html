<style>
:root {

*, *::before, *::after {

  padding: 0;

html, body {

/* ── ANIMATIONS ── */

  50% { opacity: 0.8; transform: scale(1.08); }
}

@keyframes ticker-scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 0 20px rgba(15,52,96,0.6), 0 0 40px rgba(15,52,96,0.3); }
  50% { box-shadow: 0 0 35px rgba(15,52,96,0.9), 0 0 70px rgba(0,212,170,0.25), 0 0 100px rgba(15,52,96,0.4); }

@keyframes bar-fill {

}

@keyframes fade-up {
  from { opacity: 0; transform: translateY(24px); }

}
